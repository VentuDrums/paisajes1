<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Búnker de los Vientos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap');

        body {
            background-color: #050505;
            background-image: radial-gradient(circle at center, #2a2015 0%, #050505 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .radio-casing {
            background: linear-gradient(135deg, #3e2412 0%, #1a0f05 100%);
            border-color: #8b6508;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 25px 50px -12px rgba(0,0,0,1);
        }

        .crt-screen {
            font-family: 'Share Tech Mono', monospace;
            background: #001524;
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff, 0 0 10px #00aaff;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9), 0 0 15px rgba(0, 255, 255, 0.2);
            border: 6px solid #8b6508;
            position: relative;
            overflow: hidden;
        }

        .crt-screen::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            z-index: 2;
            background-size: 100% 3px;
            pointer-events: none;
        }

        .btn-brass {
            background: linear-gradient(180deg, #c5a059 0%, #8b6508 100%);
            border: 2px solid #3e2412;
            color: #2a1b0a;
            text-shadow: 0 1px 1px rgba(255,255,255,0.3);
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.4), 0 6px 0 #3e2412, 0 8px 10px rgba(0,0,0,0.5);
            transition: all 0.1s;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }
        
        .btn-brass:active {
            transform: translateY(6px);
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.4), 0 0px 0 #3e2412, 0 2px 4px rgba(0,0,0,0.5);
        }

        .btn-play {
            background: linear-gradient(180deg, #8b0000 0%, #4a0000 100%);
            border: 2px solid #8b6508;
            color: #ffcccc;
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.2), 0 6px 0 #2a0000, 0 8px 10px rgba(0,0,0,0.5);
            transition: all 0.1s;
            cursor: pointer;
        }
        
        .btn-play:active {
            transform: translateY(6px);
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.2), 0 0px 0 #2a0000;
        }

        .tube-glow {
            animation: tubePulse 2s infinite alternate;
        }

        @keyframes tubePulse {
            0% { box-shadow: 0 0 15px #a855f7, inset 0 0 15px #a855f7; filter: brightness(1); }
            100% { box-shadow: 0 0 25px #d8b4fe, inset 0 0 25px #d8b4fe; filter: brightness(1.2); }
        }

        .waveform {
            position: absolute;
            bottom: 10%;
            left: 0;
            width: 200%;
            height: 50px;
            opacity: 0.5;
            pointer-events: none;
            z-index: 1;
            animation: waveMove 3s linear infinite;
        }

        @keyframes waveMove {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }

        .scanline-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: rgba(0, 255, 255, 0.2);
            opacity: 0.6;
            animation: scanline 4s linear infinite;
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 pt-32 pb-16 overflow-x-hidden overflow-y-auto">

    <!-- Contenedor Principal de la Radio -->
    <div class="max-w-3xl w-full radio-casing rounded-3xl border-[10px] p-6 md:p-10 relative z-10 my-auto">
        
        <!-- Tubos de vacío (Estilo Steampunk/Mágico) -->
        <div class="absolute -top-24 left-1/2 -translate-x-1/2 flex gap-6 z-[-1] items-end">
            <div class="w-10 h-20 rounded-t-full bg-purple-900/60 border-4 border-zinc-500 tube-glow relative overflow-hidden flex justify-center items-end pb-2 backdrop-blur-sm">
                <div class="w-3 h-12 bg-orange-400/90 blur-[3px] rounded-full"></div>
            </div>
            <div class="w-14 h-28 rounded-t-full bg-blue-900/60 border-4 border-zinc-400 tube-glow relative overflow-hidden flex justify-center items-end pb-2 backdrop-blur-sm" style="animation-delay: 0.5s">
                <div class="w-4 h-16 bg-cyan-400/90 blur-[3px] rounded-full"></div>
            </div>
            <div class="w-10 h-20 rounded-t-full bg-purple-900/60 border-4 border-zinc-500 tube-glow relative overflow-hidden flex justify-center items-end pb-2 backdrop-blur-sm" style="animation-delay: 0.2s">
                <div class="w-3 h-12 bg-orange-400/90 blur-[3px] rounded-full"></div>
            </div>
        </div>

        <!-- Elementos decorativos (Engranajes/Tornillos dorados) -->
        <div class="absolute top-4 left-4 w-5 h-5 rounded-full bg-[#8b6508] border-2 border-[#3e2412] shadow-inner flex items-center justify-center"><div class="w-full h-0.5 bg-[#3e2412] rotate-45"></div></div>
        <div class="absolute top-4 right-4 w-5 h-5 rounded-full bg-[#8b6508] border-2 border-[#3e2412] shadow-inner flex items-center justify-center"><div class="w-full h-0.5 bg-[#3e2412] -rotate-45"></div></div>
        <div class="absolute bottom-4 left-4 w-5 h-5 rounded-full bg-[#8b6508] border-2 border-[#3e2412] shadow-inner flex items-center justify-center"><div class="w-full h-0.5 bg-[#3e2412] -rotate-45"></div></div>
        <div class="absolute bottom-4 right-4 w-5 h-5 rounded-full bg-[#8b6508] border-2 border-[#3e2412] shadow-inner flex items-center justify-center"><div class="w-full h-0.5 bg-[#3e2412] rotate-45"></div></div>

        <!-- Título -->
        <div class="text-center mb-8 relative">
            <div class="bg-[#1a0f05] px-6 py-2 border-2 border-[#8b6508] rounded shadow-inner inline-block">
                <h1 style="font-family: 'Cinzel', serif;" class="text-2xl md:text-3xl font-bold text-[#d4af37] tracking-widest drop-shadow-[0_2px_4px_rgba(0,0,0,1)]">Transmisor Arcano</h1>
            </div>
        </div>

        <!-- Pantalla LCD / CRT -->
        <div class="crt-screen rounded-xl p-6 mb-10 h-52 flex flex-col justify-center items-center text-center relative">
            <div class="scanline-effect"></div>
            
            <!-- Ondas visuales falsas -->
            <div class="absolute inset-0 overflow-hidden opacity-80 z-0 pointer-events-none">
                <svg class="waveform" viewBox="0 0 800 50" preserveAspectRatio="none">
                    <path d="M0,25 Q20,5 40,25 T80,25 T120,25 T160,25 T200,50 T240,25 T280,0 T320,25 T360,25 T400,25 Q420,5 440,25 T480,25 T520,25 T560,25 T600,50 T640,25 T680,0 T720,25 T760,25 T800,25" fill="none" stroke="#00ffff" stroke-width="2"/>
                    <path d="M0,25 Q30,15 60,25 T120,25 T180,45 T240,25 T300,5 T360,25 T400,25 Q430,15 460,25 T520,25 T580,45 T640,25 T700,5 T760,25 T800,25" fill="none" stroke="#0088ff" stroke-width="1"/>
                </svg>
            </div>

            <!-- Contenidos de pantalla -->
            <div class="z-10 w-full">
                <!-- Pantalla de Inicio -->
                <div id="screen-start" class="block">
                    <p class="text-xl mb-2">BÚNKER DE LOS VIENTOS</p>
                    <p class="text-sm opacity-80 animate-pulse">ESPERANDO RESONANCIA...</p>
                </div>

                <!-- Pantalla de Juego -->
                <div id="screen-game" class="hidden w-full">
                    <div class="flex justify-between w-full text-xs mb-2 opacity-70">
                        <span>SINTONÍA: <span id="freq-display">84.2</span> Tms</span>
                        <span>ENERGÍA: <span id="lives-display" class="text-red-400 tracking-widest">███</span></span>
                        <span>ENLACES: <span id="progress-display">0</span>/7</span>
                    </div>
                    <p id="instrument-name" class="text-3xl font-bold my-4 opacity-0 transition-opacity duration-500">???</p>
                    <p id="feedback-message" class="text-sm h-5"></p>
                </div>

                <!-- Pantalla de Victoria -->
                <div id="screen-win" class="hidden">
                    <p class="text-lg mb-2">¡SEÑAL DECODIFICADA!</p>
                    <p class="text-sm opacity-80 mb-2">PRIMER DÍGITO DEL CÓDIGO:</p>
                    <p class="text-5xl font-bold text-white drop-shadow-[0_0_15px_#00ffff] animate-pulse">4</p>
                </div>

                <!-- Pantalla de Derrota (Game Over) -->
                <div id="screen-gameover" class="hidden">
                    <p class="text-xl mb-2 text-red-500 drop-shadow-[0_0_8px_#ef4444]">CONEXIÓN PERDIDA</p>
                    <p class="text-sm opacity-80 mb-4">El artefacto se quedó sin energía.</p>
                    <button onclick="resetGame()" class="bg-[#3e2412] hover:bg-[#8b6508] text-[#d4af37] border border-[#8b6508] px-4 py-2 rounded font-bold text-sm transition-colors uppercase">Reintentar Sintonía</button>
                </div>
            </div>
        </div>

        <!-- Controles de Interacción -->
        <div id="controls-container" class="space-y-8 bg-black/40 p-6 rounded-2xl border-t border-[#8b6508]/30 shadow-inner">
            
            <!-- Botón de Inicio / Reproducción -->
            <div class="flex justify-center">
                <button id="btn-action" class="btn-play font-bold py-4 px-10 rounded-full text-lg flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    <span id="btn-action-text">Activar Artefacto</span>
                </button>
            </div>

            <!-- Panel de Familias (Oculto al inicio) -->
            <div id="families-panel" class="grid grid-cols-2 md:grid-cols-4 gap-4 opacity-50 pointer-events-none transition-opacity duration-300">
                <button class="btn-brass py-3 px-2 rounded-xl text-xs md:text-sm" onclick="checkAnswer('viento-madera')">
                    Viento-Madera
                </button>
                <button class="btn-brass py-3 px-2 rounded-xl text-xs md:text-sm" onclick="checkAnswer('viento-metal')">
                    Viento-Metal
                </button>
                <button class="btn-brass py-3 px-2 rounded-xl text-xs md:text-sm" onclick="checkAnswer('cuerda-frotada')">
                    Cuerda Frotada
                </button>
                <button class="btn-brass py-3 px-2 rounded-xl text-xs md:text-sm" onclick="checkAnswer('percusion')">
                    Percusión
                </button>
            </div>
        </div>

    </div>

    <script>
        // --- MOTOR DE AUDIO (Web Audio API) ---
        // Genera sonidos procedurales para imitar familias de instrumentos sin necesidad de MP3s externos.
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Sintetizador Viento-Madera (Flauta/Clarinete): Onda senoidal/triangular, ataque suave, vibrato.
        function playWoodwind(freq = 440) {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            const lfo = audioCtx.createOscillator(); // Para el vibrato

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime); 

            lfo.type = 'sine';
            lfo.frequency.value = 5; // Velocidad del vibrato
            const lfoGain = audioCtx.createGain();
            lfoGain.gain.value = 10; // Profundidad del vibrato
            lfo.connect(lfoGain);
            lfoGain.connect(osc.frequency);

            // Envolvente (ADSR)
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.1); // Ataque
            gainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.2); // Decaimiento
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5); // Relajación

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            lfo.start();
            osc.stop(audioCtx.currentTime + 1.5);
            lfo.stop(audioCtx.currentTime + 1.5);
        }

        // Sintetizador Viento-Metal (Trompeta/Trombón): Onda de sierra, filtro pasa-bajos que se abre, brillante.
        function playBrass(freq = 349.23) {
            const osc = audioCtx.createOscillator();
            const filter = audioCtx.createBiquadFilter();
            const gainNode = audioCtx.createGain();

            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime); 

            filter.type = 'lowpass';
            // Envolvente del filtro (hace el sonido de "waaa")
            filter.frequency.setValueAtTime(400, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(3000, audioCtx.currentTime + 0.1);
            filter.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 1.0);

            // Envolvente de volumen
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.0);

            osc.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 1.0);
        }

        // Sintetizador Cuerda Frotada (Violín/Violonchelo): Onda de sierra, ataque muy lento, sostenido largo.
        function playBowedString(freq = 293.66) {
            const osc = audioCtx.createOscillator();
            const filter = audioCtx.createBiquadFilter();
            const gainNode = audioCtx.createGain();

            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime); 

            filter.type = 'lowpass';
            filter.frequency.value = 1500;

            // Envolvente de volumen (ataque lento de arco)
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.4); // Ataque lento
            gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime + 1.2); // Sostenido
            gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 1.8); // Relajación

            osc.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 1.8);
        }

        // Sintetizador Percusión (Timbal/Bombo): Ruido + Onda senoidal de caída rápida.
        function playPercussion(freq = 150) {
            // Parte 1: El golpe (transitorio)
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq * 0.25, audioCtx.currentTime + 0.1); // Pitch drop

            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.8, audioCtx.currentTime + 0.01); // Ataque instantáneo
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5); // Decaimiento rápido

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        // Efecto de Radio/Estática al fallar
        function playStatic() {
            const bufferSize = audioCtx.sampleRate * 0.5; // 0.5 segundos
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 1000;
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            
            noise.start();
        }

        // Efecto de acierto (Beep corto)
        function playSuccess() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
            osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); // G5
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        // Efecto de error (Zumbido y estática)
        function playErrorSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3); // Caída de tono rápida
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
            
            playStatic(); // Combina con la estática de radio
        }

        // --- LÓGICA DEL JUEGO ---

        const instrumentsDB = [
            { name: "FLAUTA TRAVESERA", family: "viento-madera", play: () => playWoodwind(880) },
            { name: "OBOE", family: "viento-madera", play: () => playWoodwind(440) },
            { name: "CLARINETE", family: "viento-madera", play: () => playWoodwind(261.63) },
            { name: "FAGOT", family: "viento-madera", play: () => playWoodwind(130.81) },
            { name: "TROMPETA", family: "viento-metal", play: () => playBrass(523.25) },
            { name: "TROMPA", family: "viento-metal", play: () => playBrass(349.23) },
            { name: "TROMBÓN", family: "viento-metal", play: () => playBrass(174.61) },
            { name: "TUBA", family: "viento-metal", play: () => playBrass(87.31) },
            { name: "VIOLÍN", family: "cuerda-frotada", play: () => playBowedString(659.25) },
            { name: "VIOLONCHELO", family: "cuerda-frotada", play: () => playBowedString(196) },
            { name: "CONTRABAJO", family: "cuerda-frotada", play: () => playBowedString(98) },
            { name: "TIMBALES", family: "percusion", play: () => playPercussion(200) }
        ];

        let currentRound = 0;
        const totalRounds = 7;
        let lives = 3;
        let currentInstrument = null;
        let gameActive = false;

        // Elementos DOM
        const btnAction = document.getElementById('btn-action');
        const btnActionText = document.getElementById('btn-action-text');
        const screenStart = document.getElementById('screen-start');
        const screenGame = document.getElementById('screen-game');
        const screenWin = document.getElementById('screen-win');
        const screenGameover = document.getElementById('screen-gameover');
        const familiesPanel = document.getElementById('families-panel');
        const instrumentNameEl = document.getElementById('instrument-name');
        const feedbackMessageEl = document.getElementById('feedback-message');
        const progressDisplay = document.getElementById('progress-display');
        const freqDisplay = document.getElementById('freq-display');
        const livesDisplay = document.getElementById('lives-display');

        // Manejador del botón principal
        btnAction.addEventListener('click', () => {
            initAudio(); // Necesario por las políticas de navegadores
            
            if (!gameActive) {
                // Iniciar juego (sea desde el inicio o desde un Game Over)
                startGame();
            } else if (gameActive && currentInstrument) {
                // Reproducir pista actual
                playCurrentHint();
            }
        });

        function startGame() {
            gameActive = true;
            currentRound = 0;
            lives = 3;
            updateLivesDisplay();
            
            // Restaurar visuales (pantalla azul) por si venimos de un Game Over en rojo
            document.querySelector('.crt-screen').style.color = '#00ffff';
            document.querySelector('.crt-screen').style.textShadow = '0 0 5px #00ffff, 0 0 10px #00aaff';
            
            screenStart.classList.add('hidden');
            screenGameover.classList.add('hidden');
            screenGame.classList.remove('hidden');
            familiesPanel.classList.remove('opacity-50', 'pointer-events-none');
            
            btnActionText.innerText = "Escuchar Señal";
            btnAction.classList.remove('btn-play');
            btnAction.classList.add('btn-brass');
            
            nextRound();
        }

        function nextRound() {
            if (currentRound >= totalRounds) {
                winGame();
                return;
            }

            // Seleccionar instrumento aleatorio
            currentInstrument = instrumentsDB[Math.floor(Math.random() * instrumentsDB.length)];
            
            // Actualizar UI
            progressDisplay.innerText = currentRound;
            freqDisplay.innerText = (Math.random() * (108 - 87) + 87).toFixed(1); // Frecuencia aleatoria
            instrumentNameEl.innerText = "Interceptando...";
            instrumentNameEl.classList.remove('opacity-100');
            instrumentNameEl.classList.add('opacity-0');
            feedbackMessageEl.innerText = "";
            
            // Simular retraso de radio
            setTimeout(() => {
                instrumentNameEl.innerText = currentInstrument.name;
                instrumentNameEl.classList.remove('opacity-0');
                instrumentNameEl.classList.add('opacity-100');
                playCurrentHint();
            }, 800);
        }

        function playCurrentHint() {
            if (!currentInstrument || !audioCtx) return;
            
            // Simula estática al principio
            const staticOsc = audioCtx.createOscillator();
            staticOsc.type = 'sawtooth';
            const staticGain = audioCtx.createGain();
            staticGain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            staticGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            staticOsc.connect(staticGain);
            staticGain.connect(audioCtx.destination);
            staticOsc.start();
            staticOsc.stop(audioCtx.currentTime + 0.2);

            // Reproduce el timbre del instrumento
            setTimeout(() => {
                currentInstrument.play();
            }, 100);
        }

        function updateLivesDisplay() {
            // Dibuja bloques macizos para vidas actuales y guiones para las gastadas
            livesDisplay.innerText = '█'.repeat(lives) + '_'.repeat(3 - lives);
        }

        window.checkAnswer = function(selectedFamily) {
            if (!gameActive || !currentInstrument) return;

            if (selectedFamily === currentInstrument.family) {
                // Correcto
                playSuccess();
                currentRound++;
                progressDisplay.innerText = currentRound;
                feedbackMessageEl.innerText = "¡ENLACE ESTABLECIDO!";
                feedbackMessageEl.className = "text-sm h-5 text-green-300 font-bold";
                
                currentInstrument = null; // Bloquear hasta siguiente ronda
                
                setTimeout(() => {
                    nextRound();
                }, 1500);

            } else {
                // Incorrecto
                lives--;
                updateLivesDisplay();
                playErrorSound();
                
                if (lives > 0) {
                    feedbackMessageEl.innerText = "ERROR DE SINTONÍA.";
                    feedbackMessageEl.className = "text-sm h-5 text-red-400 font-bold";
                    
                    // Efecto de fallo visual en la pantalla
                    document.querySelector('.crt-screen').style.color = '#ef4444';
                    document.querySelector('.crt-screen').style.textShadow = '0 0 5px #ef4444';
                    
                    currentInstrument = null; // Fuerza a descartar el instrumento actual
                    
                    setTimeout(() => {
                        document.querySelector('.crt-screen').style.color = '#00ffff';
                        document.querySelector('.crt-screen').style.textShadow = '0 0 5px #00ffff, 0 0 10px #00aaff';
                        feedbackMessageEl.innerText = "";
                        nextRound(); // Salta al siguiente instrumento a pesar del error
                    }, 1500);
                } else {
                    // Game Over
                    gameOver();
                }
            }
        };

        function gameOver() {
            gameActive = false;
            currentInstrument = null;
            screenGame.classList.add('hidden');
            screenGameover.classList.remove('hidden');
            familiesPanel.classList.add('opacity-50', 'pointer-events-none');
            
            btnActionText.innerText = "Reiniciar Artefacto";
            
            // Efecto de fallo visual extremo
            document.querySelector('.crt-screen').style.color = '#ef4444';
            document.querySelector('.crt-screen').style.textShadow = '0 0 10px #ef4444';
        }

        window.resetGame = function() {
            // El botón interno de "Reintentar Sintonía" ahora arranca el juego directamente
            startGame();
        }

        function winGame() {
            gameActive = false;
            screenGame.classList.add('hidden');
            screenWin.classList.remove('hidden');
            familiesPanel.classList.add('opacity-50', 'pointer-events-none');
            
            btnActionText.innerText = "Transmisión Finalizada";
            btnAction.disabled = true;
            btnAction.classList.add('opacity-50', 'cursor-not-allowed');
            
            // Sonido de victoria
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.setValueAtTime(554.37, audioCtx.currentTime + 0.2);
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.4);
            osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.6);
            
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        }
    </script>
</body>
</html>
